# Pre-commit hooks for claude-code-openai-wrapper.
#
# One-time setup per clone:
#     poetry install
#     poetry run pre-commit install
#
# After that, black runs automatically on every `git commit`, so unformatted
# code can't reach a commit (and therefore can't reach a PR or main).
#
# IMPORTANT: `rev` below MUST stay in sync with the black version pinned in
# poetry.lock (currently 24.10.0). pre-commit runs black in its own isolated
# environment, so pinning here guarantees commits are formatted with the exact
# same version the CI `black --check src tests` gate uses. If you bump black in
# pyproject.toml/poetry.lock, bump this rev to match.
#
# Line length and target version come from [tool.black] in pyproject.toml
# (line-length = 100); black discovers that config automatically.
repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: black (format src and tests)
        # Mirror the CI gate exactly: only src/ and tests/ are checked there.
        files: ^(src|tests)/.*\.py$
